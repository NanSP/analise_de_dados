<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sistema Acadêmico</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="site-header">
      <div class="container header-inner">
        <h1>Gerenciamento Acadêmico</h1>
      </div>
    </header>

    <div class="buttons container">
      <button id="btnVoltar" class="back">Voltar ao menu</button>
      <button id="btnArtigos">Artigos</button>

      <button id="btnKeywords">Palavras-chave</button>

      <button id="btnAutores">Autores</button>

      <button id="btnReferencias">Referências</button>
      <button id="btnIssnIsbn">ISSN / ISBN</button>

      <button id="btnFillDoi">Preencher DOI vazios</button>

      <button class="success" id="btnUpload">Carregar Dados CSV</button>

      <button class="danger" id="btnLimpar">Limpar Dados</button>
    </div>

    <input type="file" id="fileInput" accept=".csv" />

    <div class="info" id="info"></div>

    <section class="charts-panel" id="chartsPanel" hidden>
      <div class="chart-card">
        <div class="chart-head">
          <h3>Artigos por ano</h3>
          <span id="yearSummary">Aguardando dados</span>
        </div>
        <svg
          id="yearChart"
          class="chart-svg"
          viewBox="0 0 420 220"
          role="img"
          aria-label="Gráfico de artigos por ano"
        ></svg>
      </div>

      <div class="chart-card">
        <div class="chart-head">
          <h3>Top autores</h3>
          <span id="authorSummary">Aguardando dados</span>
        </div>
        <svg
          id="authorChart"
          class="chart-svg"
          viewBox="0 0 420 220"
          role="img"
          aria-label="Gráfico de autores"
        ></svg>
      </div>
    </section>

    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>

    <script type="module" src="/app.js"></script>
  </body>
</html>
