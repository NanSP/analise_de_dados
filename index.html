<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sistema Acadêmico</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>Gerenciador Acadêmico</h1>

    <div class="buttons">
      <button id="btnArtigos">Artigos</button>

      <button id="btnKeywords">Palavras-chave</button>

      <button id="btnAutores">Autores</button>

      <button id="btnReferencias">Referências</button>
      <button id="btnIssnIsbn">ISSN / ISBN</button>

      <button class="success" id="btnUpload">Carregar Dados CSV</button>

      <button class="danger" id="btnLimpar">Limpar Dados</button>
    </div>

    <input type="file" id="fileInput" accept=".csv" />

    <div class="info" id="info"></div>

    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>

    <script type="module" src="/app.js"></script>
  </body>
</html>
